# Profile "kubernetes" — surcharge pour deploiement K8s ClubHub
# Active via SPRING_PROFILES_ACTIVE=kubernetes (cf. Dockerfile)
#
# Architecture : pod multi-container = service + Mongo
# Donc Mongo accessible via localhost:27017 (les 2 containers partagent le network namespace du pod)

# === Desactiver Eureka (K8s DNS natif) ===
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# === MongoDB (sidecar dans le meme pod) ===
spring.data.mongodb.uri=mongodb://localhost:27017/User
spring.data.mongodb.database=User
spring.mongodb.uri=mongodb://localhost:27017/User
spring.mongodb.database=User

# === Cross-services URLs (K8s DNS) ===
# Les services s'appellent par leur nom K8s : <service-name>:<port>
user-service.url=http://user-service:8081
club-service.url=http://club-service:8083
voice-service.url=http://voice-service:8082
clubhub-backend.url=http://clubhub-backend:8088
messaging-service.url=http://messaging-service:8089
store-service.url=http://store-service:8087
treasury-service.url=http://treasury-service:8085
gateway.url=http://gateway:8084

# === Server port (rappel) ===
server.port=8081
