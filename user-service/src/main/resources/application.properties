spring.application.name=user-service
spring.mongodb.uri=mongodb://localhost:27017/User
spring.mongodb.database=User
server.port=8081

# ===========================================================================
# Eureka — ce service s'enregistre dans l'annuaire au démarrage et envoie un
# heartbeat toutes les 30s. Le Gateway le trouve ensuite via `lb://user-service`.
# ===========================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

jwt.secret=clubhub_super_secret_key_must_be_at_least_32_chars!
jwt.expiration=86400000
# Allow large JSON bodies for base64 profile photos (up to 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-http-form-post-size=5MB
server.tomcat.max-swallow-size=5MB

# ===========================================================================
# SpringDoc OpenAPI / Swagger UI
# Swagger UI: http://localhost:8081/swagger-ui.html
# OpenAPI JSON: http://localhost:8081/api-docs
# ===========================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method