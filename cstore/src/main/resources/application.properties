# Application name (must match the gateway route)
spring.application.name=store-service

# Fixed port (8087 to avoid conflict with Voice2 on 8082)
server.port=8087

# MongoDB connection
spring.data.mongodb.uri=mongodb://localhost:27017/clubstore

# Disable Spring Security (for development)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Eureka client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.enabled=true
spring.cloud.service-registry.auto-registration.enabled=true

# Shared JWT secret (aligned with rest of ClubHub microservices)
jwt.secret=clubhub_super_secret_key_must_be_at_least_32_chars!

# Optional: Groq API key (if used)
groq.api.key=${GROQ_API_KEY:}
