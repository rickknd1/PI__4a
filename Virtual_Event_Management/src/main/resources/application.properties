spring.application.name=virtual-event-management

# Port 8086 : 8082 est deja utilise par voice-service (cf. Gateway/application.properties).
# Autres micro-services : 8080 (clubhub-backend), 8081 (user-service), 8082 (voice-service),
# 8083 (club-service), 8084 (gateway), 8000 (ai-service Python), 8761 (Eureka).
server.port=8086

# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=Virtual_Event

# Logs: Mongo at INFO (DEBUG logs every query, including @Scheduled findAll). Use DEBUG to troubleshoot.
logging.level.org.springframework.data.mongodb=INFO
logging.level.tn.esprit.virtual_event_management=INFO

# ===========================================================================
# FILE UPLOAD LIMITS (Augmenté pour les fichiers audio)
# ===========================================================================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ===========================================================================
# Eureka : VEM s'enregistre dans l'annuaire pour que la Gateway puisse router
# /api/virtual-events/** via lb://virtual-event-management.
# Nom en kebab-case (RFC 1123) : Gateway 5.x refuse les underscores dans
# les hostnames du lb://.
# ===========================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Whisper local (Flask)
whisper.api.url=http://localhost:9000/v1/audio/transcriptions

# HuggingFace (fallback)
huggingface.api.url=https://router.huggingface.co/hf-inference/models/openai/whisper-large-v3
huggingface.api.token=${HUGGINGFACE_API_TOKEN:}

# Langues supportees
whisper.supported.languages=ar,fr,en,es,de,it
whisper.default.language=ar

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=amenibelkir@gmail.com
spring.mail.password=sdscaothojmfxdih
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Chatbot
gemini.api.key=${GEMINI_API_KEY:}

# ===========================================================================
# SpringDoc OpenAPI / Swagger UI
# Swagger UI: http://localhost:8086/swagger-ui.html
# OpenAPI JSON: http://localhost:8086/api-docs
# ===========================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
