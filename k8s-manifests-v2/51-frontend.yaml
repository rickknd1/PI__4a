---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: clubhub
  labels: {app: frontend, tier: frontend}
spec:
  selector: {app: frontend}
  ports:
    - {name: http, port: 80, targetPort: 80}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: clubhub
  labels: {app: frontend, tier: frontend}
spec:
  replicas: 1
  selector: {matchLabels: {app: frontend}}
  template:
    metadata: {labels: {app: frontend, tier: frontend}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: In, values: [k8s-worker-1]}
      containers:
        - name: nginx
          image: docker.io/rickknd/clubhub-frontend:v1
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 80, name: http}]
          resources:
            requests: {memory: 64Mi, cpu: 50m}
            limits: {memory: 256Mi, cpu: 500m}
          livenessProbe:
            httpGet: {path: /, port: 80}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /, port: 80}
            initialDelaySeconds: 5
            periodSeconds: 10
