---
apiVersion: v1
kind: Service
metadata:
  name: store-service
  namespace: clubhub
  labels: {app: store-app, tier: backend}
spec:
  selector: {app: store-app}
  ports:
    - {name: http, port: 8087, targetPort: 8087}
---
apiVersion: v1
kind: Service
metadata:
  name: store-app
  namespace: clubhub
  labels: {app: store-app, tier: backend, alias: "true"}
spec:
  selector: {app: store-app}
  ports:
    - {name: http, port: 8087, targetPort: 8087}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-app
  namespace: clubhub
  labels: {app: store-app, tier: backend}
spec:
  replicas: 0
  selector: {matchLabels: {app: store-app}}
  template:
    metadata: {labels: {app: store-app, tier: backend}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: In, values: [k8s-worker-1]}
      containers:
        - name: app
          image: docker.io/rickknd/clubhub-store:v1
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8087, name: http}]
          env:
            - {name: SPRING_PROFILES_ACTIVE, valueFrom: {configMapKeyRef: {name: clubhub-config, key: SPRING_PROFILES_ACTIVE}}}
            - {name: SPRING_DATA_MONGODB_URI, value: "mongodb://store-db:27017/clubstore"}
            - {name: USER_SERVICE_URL, value: "http://user-service:8081"}
            - {name: TREASURY_SERVICE_URL, value: "http://treasury-service:8085"}
            - {name: JWT_SECRET, valueFrom: {secretKeyRef: {name: clubhub-secrets, key: JWT_SECRET}}}
            - {name: JAVA_OPTS, valueFrom: {configMapKeyRef: {name: clubhub-config, key: JAVA_OPTS}}}
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 768Mi, cpu: 1000m}
          livenessProbe:
            tcpSocket: {port: 8087}
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket: {port: 8087}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
