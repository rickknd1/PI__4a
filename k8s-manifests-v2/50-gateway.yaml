---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: clubhub
  labels: {app: gateway, tier: gateway}
spec:
  selector: {app: gateway}
  ports:
    - {name: http, port: 8084, targetPort: 8084}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: clubhub
  labels: {app: gateway, tier: gateway}
spec:
  replicas: 1
  selector: {matchLabels: {app: gateway}}
  template:
    metadata: {labels: {app: gateway, tier: gateway}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: In, values: [k8s-worker-1]}
      containers:
        - name: app
          image: docker.io/rickknd/clubhub-gateway:v1
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8084, name: http}]
          env:
            - {name: SPRING_PROFILES_ACTIVE, valueFrom: {configMapKeyRef: {name: clubhub-config, key: SPRING_PROFILES_ACTIVE}}}
            - {name: USER_SERVICE_URL, value: "http://user-app:8081"}
            - {name: CLUB_SERVICE_URL, value: "http://club-app:8083"}
            - {name: EVENT_SERVICE_URL, value: "http://event-app:8088"}
            - {name: MESSAGING_SERVICE_URL, value: "http://messaging-app:8089"}
            - {name: JWT_SECRET, valueFrom: {secretKeyRef: {name: clubhub-secrets, key: JWT_SECRET}}}
            - {name: JAVA_OPTS, valueFrom: {configMapKeyRef: {name: clubhub-config, key: JAVA_OPTS}}}
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 768Mi, cpu: 1000m}
          livenessProbe:
            tcpSocket: {port: 8084}
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket: {port: 8084}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
