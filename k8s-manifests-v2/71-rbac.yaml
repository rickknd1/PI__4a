---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clubhub-app-sa
  namespace: clubhub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clubhub-app-reader
  namespace: clubhub
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clubhub-app-reader
  namespace: clubhub
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: clubhub-app-reader
subjects:
  - kind: ServiceAccount
    name: clubhub-app-sa
    namespace: clubhub
