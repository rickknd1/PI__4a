---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: clubhub
  labels: {app: user-app, tier: backend}
spec:
  selector: {app: user-app}
  ports:
    - {name: http, port: 8081, targetPort: 8081}
---
# Alias historique pour les apps internes qui s'attendent au nom "user-app"
apiVersion: v1
kind: Service
metadata:
  name: user-app
  namespace: clubhub
  labels: {app: user-app, tier: backend, alias: "true"}
spec:
  selector: {app: user-app}
  ports:
    - {name: http, port: 8081, targetPort: 8081}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-app
  namespace: clubhub
  labels: {app: user-app, tier: backend}
spec:
  replicas: 1
  selector: {matchLabels: {app: user-app}}
  template:
    metadata: {labels: {app: user-app, tier: backend}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: In, values: [k8s-worker-1]}
      containers:
        - name: app
          image: docker.io/rickknd/clubhub-user:v1
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8081, name: http}]
          env:
            - {name: SPRING_PROFILES_ACTIVE, valueFrom: {configMapKeyRef: {name: clubhub-config, key: SPRING_PROFILES_ACTIVE}}}
            - {name: SPRING_DATA_MONGODB_URI, value: "mongodb://user-db:27017/userdb"}
            - {name: JWT_SECRET, valueFrom: {secretKeyRef: {name: clubhub-secrets, key: JWT_SECRET}}}
            - {name: JAVA_OPTS, valueFrom: {configMapKeyRef: {name: clubhub-config, key: JAVA_OPTS}}}
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 768Mi, cpu: 1000m}
          livenessProbe:
            tcpSocket: {port: 8081}
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket: {port: 8081}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
