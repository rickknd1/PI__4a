# AI Service : Python FastAPI, stateless, pas de DB séparée
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: clubhub
  labels: {app: ai-service, tier: backend}
spec:
  selector: {app: ai-service}
  ports:
    - {name: http, port: 8090, targetPort: 8090}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: clubhub
  labels: {app: ai-service, tier: backend}
spec:
  replicas: 0
  selector: {matchLabels: {app: ai-service}}
  template:
    metadata: {labels: {app: ai-service, tier: backend}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: In, values: [k8s-worker-1]}
      containers:
        - name: ai
          image: docker.io/rickknd/clubhub-ai:v1
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8090, name: http}]
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: groq_api_key
                  optional: true
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 512Mi, cpu: 1000m}
          livenessProbe:
            tcpSocket: {port: 8090}
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket: {port: 8090}
            initialDelaySeconds: 10
            periodSeconds: 10
