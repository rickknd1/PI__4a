---
apiVersion: v1
kind: Service
metadata:
  name: treasury-db
  namespace: clubhub
  labels: {app: treasury-db, tier: database}
spec:
  clusterIP: None
  selector: {app: treasury-db}
  ports:
    - {name: mongo, port: 27017, targetPort: 27017}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: treasury-db
  namespace: clubhub
spec:
  serviceName: treasury-db
  replicas: 0
  selector: {matchLabels: {app: treasury-db}}
  template:
    metadata: {labels: {app: treasury-db, tier: database}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: In, values: [k8s-worker-1]}
      containers:
        - name: mongo
          image: docker.io/library/mongo:7
          ports: [{containerPort: 27017, name: mongo}]
          volumeMounts:
            - {name: data, mountPath: /data/db}
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 1Gi, cpu: 1000m}
          livenessProbe:
            tcpSocket: {port: 27017}
            initialDelaySeconds: 30
      volumes:
        - name: data
          hostPath:
            path: /mnt/worker-storage/treasury-db
            type: DirectoryOrCreate
