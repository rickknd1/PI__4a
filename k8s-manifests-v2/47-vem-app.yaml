---
apiVersion: v1
kind: Service
metadata:
  name: vem-service
  namespace: clubhub
  labels: {app: vem-app, tier: backend}
spec:
  selector: {app: vem-app}
  ports:
    - {name: http, port: 8086, targetPort: 8086}
---
apiVersion: v1
kind: Service
metadata:
  name: vem-app
  namespace: clubhub
  labels: {app: vem-app, tier: backend, alias: "true"}
spec:
  selector: {app: vem-app}
  ports:
    - {name: http, port: 8086, targetPort: 8086}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vem-app
  namespace: clubhub
  labels: {app: vem-app, tier: backend}
spec:
  replicas: 0
  selector: {matchLabels: {app: vem-app}}
  template:
    metadata: {labels: {app: vem-app, tier: backend}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: In, values: [k8s-worker-1]}
      containers:
        - name: app
          image: docker.io/rickknd/clubhub-vem:v1
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8086, name: http}]
          env:
            - {name: SPRING_PROFILES_ACTIVE, valueFrom: {configMapKeyRef: {name: clubhub-config, key: SPRING_PROFILES_ACTIVE}}}
            - {name: SPRING_DATA_MONGODB_URI, value: "mongodb://vem-db:27017/Virtual_Event"}
            - {name: USER_SERVICE_URL, value: "http://user-service:8081"}
            - {name: CLUB_SERVICE_URL, value: "http://club-service:8083"}
            - {name: EVENT_SERVICE_URL, value: "http://clubhub-backend:8088"}
            - {name: AI_SERVICE_URL, value: "http://ai-service:8090"}
            - {name: JWT_SECRET, valueFrom: {secretKeyRef: {name: clubhub-secrets, key: JWT_SECRET}}}
            - {name: JAVA_OPTS, valueFrom: {configMapKeyRef: {name: clubhub-config, key: JAVA_OPTS}}}
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 768Mi, cpu: 1000m}
          livenessProbe:
            tcpSocket: {port: 8086}
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket: {port: 8086}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
