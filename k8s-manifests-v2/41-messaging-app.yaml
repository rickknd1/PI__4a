---
apiVersion: v1
kind: Service
metadata:
  name: messaging-app
  namespace: clubhub
  labels: {app: messaging-app, tier: backend}
spec:
  selector: {app: messaging-app}
  ports:
    - {name: http, port: 8089, targetPort: 8089}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-app
  namespace: clubhub
  labels: {app: messaging-app, tier: backend}
spec:
  replicas: 1
  selector: {matchLabels: {app: messaging-app}}
  template:
    metadata: {labels: {app: messaging-app, tier: backend}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: In, values: [k8s-worker-1]}
      containers:
        - name: app
          image: docker.io/rickknd/clubhub-messaging:v1
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8089, name: http}]
          env:
            - {name: SPRING_PROFILES_ACTIVE, valueFrom: {configMapKeyRef: {name: clubhub-config, key: SPRING_PROFILES_ACTIVE}}}
            - {name: SPRING_DATA_MONGODB_URI, value: "mongodb://messaging-db:27017/Messaging"}
            - {name: USER_SERVICE_URL, value: "http://user-app:8081"}
            - {name: AI_SERVICE_URL, value: "http://ai-service:8090"}
            - {name: JWT_SECRET, valueFrom: {secretKeyRef: {name: clubhub-secrets, key: JWT_SECRET}}}
            - {name: GROQ_API_KEY, valueFrom: {secretKeyRef: {name: ai-secrets, key: groq_api_key, optional: true}}}
            - {name: JAVA_OPTS, valueFrom: {configMapKeyRef: {name: clubhub-config, key: JAVA_OPTS}}}
          resources:
            requests: {memory: 256Mi, cpu: 100m}
            limits: {memory: 768Mi, cpu: 1000m}
          livenessProbe:
            httpGet: {path: /actuator/health/liveness, port: 8089}
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /actuator/health/readiness, port: 8089}
            initialDelaySeconds: 30
            periodSeconds: 10
