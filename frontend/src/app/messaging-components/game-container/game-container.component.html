<div #gameRoot class="game-root">

    <!-- Ambient atmosphere layer -->
    <div class="ambient-glow"></div>
    <div class="ambient-glow ambient-glow--secondary"></div>

    <!-- GAME AREA -->
    <div class="game-area" [class.chat-open]="showChat">

        <!-- Top bar -->
        <div class="game-topbar">
            <div class="game-topbar-left">
                <div class="game-logo-mark">Q</div>
                <span class="game-title">Quiz<span class="game-title-accent">Arena</span></span>
            </div>
            <div class="game-topbar-right">
                <button class="topbar-btn chat-btn" (click)="toggleChat()" *ngIf="gamePhase">
                    <svg class="topbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    <span *ngIf="unreadCount > 0" class="badge">{{ unreadCount }}</span>
                </button>
                <button class="topbar-btn" (click)="toggleFullscreen()" *ngIf="gamePhase">
                    <svg *ngIf="!isFullscreen" class="topbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
                    </svg>
                    <svg *ngIf="isFullscreen" class="topbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 9L4 4m0 0h4M4 4v4m5 11l-5-5m0 0v4m0-4h4m11 5l-5-5m0 0h4m0 0v4m-5-11l5-5m0 0h-4m4 0v4"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Game content -->
        <div class="game-content">
            <app-game-question
                    *ngIf="gamePhase === 'QUESTION'"
                    #questionComp
                    [gameId]="gameId"
                    [currentUserId]="currentUserId"
                    (answerSubmitted)="onAnswerSubmitted()">
            </app-game-question>

            <app-answer-reveal
                    *ngIf="gamePhase === 'REVEAL'"
                    [event]="revealEvent"
                    [selectedAnswer]="selectedAnswer"
                    [currentUserId]="currentUserId">
            </app-answer-reveal>

            <app-game-leaderboard
                    *ngIf="gamePhase === 'LEADERBOARD'"
                    [event]="leaderboardEvent"
                    [currentUserId]="currentUserId"
                    [conversationId]="conversationId"
                    (playAgain)="onPlayAgain()"
                    (close)="onCloseGame()">
            </app-game-leaderboard>
        </div>
    </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel" [class.open]="showChat">

        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-status-dot"></div>
                <span class="chat-header-title">Game Chat</span>
            </div>
            <button class="chat-close-btn" (click)="toggleChat()">
                <svg class="topbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="chat-messages" #chatScroll>
            <div *ngIf="messages.length === 0" class="chat-empty">
                <div class="chat-empty-icon">💬</div>
                <p class="chat-empty-text">No messages yet</p>
                <p class="chat-empty-hint">Say hi to other players!</p>
            </div>

            <div *ngFor="let msg of messages"
                 class="chat-msg"
                 [class.mine]="isMine(msg.senderId)">
                <div class="chat-bubble" [class.mine]="isMine(msg.senderId)">
                    <p class="chat-sender" *ngIf="!isMine(msg.senderId)">
                        Player {{ msg.senderId.slice(-4) }}
                    </p>
                    <p class="chat-text">{{ msg.content }}</p>
                    <p class="chat-time">{{ msg.time }}</p>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input
                    [(ngModel)]="chatInput"
                    (keydown)="onChatKeydown($event)"
                    placeholder="Message..."
                    class="chat-input"
                    maxlength="200"/>
            <button class="chat-send-btn" (click)="sendChatMessage()" [disabled]="!chatInput.trim()">
                <svg class="topbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
            </button>
        </div>
    </div>

</div>
