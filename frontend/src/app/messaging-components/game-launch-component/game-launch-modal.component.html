<div class="modal-shell" (click)="$event.stopPropagation()">

    <!-- Floating close button — replaces header close btn -->
    <button class="modal-close-btn" (click)="closeModal()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>

    <!-- Scrollable body -->
    <div class="modal-body">

        <!-- Title inside body -->
        <div class="modal-title-row">
            <div class="modal-logo-mark">Q</div>
            <div>
                <h2 class="modal-title">Create Quiz</h2>
                <p class="modal-subtitle">Lobby Configuration</p>
            </div>
        </div>

        <!-- Category -->
        <section class="modal-section">
            <div class="section-label-row">
                <span class="section-label">Select Category</span>
                <span class="section-badge">Trivia API</span>
            </div>
            <div class="category-grid">
                <button *ngFor="let cat of categories"
                        (click)="selectedCategory = cat.value"
                        [class.selected]="selectedCategory === cat.value"
                        class="category-btn">
                    <span class="category-icon">{{ cat.icon }}</span>
                    <span class="category-label">{{ cat.label }}</span>
                </button>
            </div>
        </section>

        <!-- Difficulty -->
        <section class="modal-section">
            <span class="section-label">Challenge Level</span>
            <div class="difficulty-row">
                <button *ngFor="let diff of difficulties"
                        (click)="selectedDifficulty = diff.value"
                        [class.selected]="selectedDifficulty === diff.value"
                        class="difficulty-btn">
                    <span class="difficulty-icon">{{ diff.icon }}</span>
                    <span class="difficulty-label" [class.active]="selectedDifficulty === diff.value">
                        {{ diff.label }}
                    </span>
                </button>
            </div>
            <p class="difficulty-desc">"{{ difficulties[getSelectedDifficultyIndex()].desc }}"</p>
        </section>

        <!-- Questions + Time -->
        <div class="counts-grid">
            <div>
                <span class="section-label">
                    Questions: <span class="count-value">{{ selectedQuestionCount }}</span>
                </span>
                <div class="count-row">
                    <button *ngFor="let count of questionCounts"
                            (click)="selectedQuestionCount = count"
                            [class.selected]="selectedQuestionCount === count"
                            class="count-btn">
                        {{ count }}
                    </button>
                </div>
            </div>
            <div>
                <span class="section-label">
                    Per Round: <span class="count-value">{{ selectedTimeLimit }}s</span>
                </span>
                <div class="count-row">
                    <button *ngFor="let time of timeLimits"
                            (click)="selectedTimeLimit = time"
                            [class.selected]="selectedTimeLimit === time"
                            class="count-btn">
                        {{ time }}s
                    </button>
                </div>
            </div>
        </div>

        <!-- Error -->
        <div *ngIf="error" class="modal-error">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {{ error }}
        </div>
    </div>

    <!-- Footer -->
    <footer class="modal-footer">
        <button class="modal-discard-btn" (click)="closeModal()">Discard</button>
        <button class="modal-launch-btn" (click)="createGame()" [disabled]="loading">
            <span *ngIf="loading" class="launch-loading">
                <svg class="spinner" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" style="opacity:.25"/>
                    <path fill="currentColor" style="opacity:.85" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                </svg>
                Deploying...
            </span>
            <span *ngIf="!loading" class="launch-content">
                Launch Match
                <span class="launch-arrow">→</span>
            </span>
        </button>
    </footer>

</div>
