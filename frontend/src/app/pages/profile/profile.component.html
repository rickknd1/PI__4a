<div class="container mx-auto px-4 py-8 max-w-4xl">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg overflow-hidden">
    
    <!-- Header avec photo de profil -->
    <div class="bg-gradient-to-r from-blue-500 to-purple-600 h-32"></div>
    
    <div class="px-6 pb-6">
      <!-- Photo de profil -->
      <div class="flex flex-col md:flex-row md:items-end md:justify-between -mt-16 mb-6">
        <div class="relative mb-4 md:mb-0">
          <div class="w-32 h-32 rounded-full border-4 border-white dark:border-gray-800 bg-gray-200 dark:bg-gray-700 overflow-hidden flex items-center justify-center">
            @if (user.profilePhoto) {
              <img [src]="user.profilePhoto" alt="Profile" class="w-full h-full object-cover" />
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            }
          </div>
          
          <!-- Bouton upload photo -->
          <label class="absolute bottom-0 right-0 w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center cursor-pointer hover:bg-blue-600 transition shadow-lg">
            @if (uploading) {
              <svg class="animate-spin w-5 h-5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
            } @else {
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            }
            <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" [disabled]="uploading" />
          </label>
        </div>

        <!-- Bouton Edit -->
        @if (!isEditing) {
          <button (click)="startEdit()" class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Modifier le profil
          </button>
        }
      </div>

      <!-- Mode Affichage -->
      @if (!isEditing) {
        <div class="space-y-6">
          <div>
            <h1 class="text-3xl font-bold text-gray-800 dark:text-white">
              {{ user.firstName }} {{ user.lastName }}
            </h1>
            <p class="text-lg text-gray-600 dark:text-gray-400 mt-1">{{ getRoleDisplay() }}</p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-500 dark:text-gray-400">Email</label>
              <p class="text-gray-800 dark:text-white">{{ user.email }}</p>
            </div>

            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-500 dark:text-gray-400">Téléphone</label>
              <p class="text-gray-800 dark:text-white">{{ user.phoneNumber || 'Non renseigné' }}</p>
            </div>

            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-500 dark:text-gray-400">Rôle</label>
              <p class="text-gray-800 dark:text-white">{{ getRoleDisplay() }}</p>
            </div>

            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-500 dark:text-gray-400">ID Utilisateur</label>
              <p class="text-gray-800 dark:text-white text-sm font-mono">{{ user.userId }}</p>
            </div>
          </div>
        </div>
      }

      <!-- Mode Édition -->
      @if (isEditing) {
        <form (ngSubmit)="saveChanges()" class="space-y-6">
          <div>
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-4">Modifier les informations</h2>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Prénom</label>
              <input 
                type="text" 
                [(ngModel)]="editData.firstName" 
                name="firstName"
                required
                class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
              />
            </div>

            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Nom</label>
              <input 
                type="text" 
                [(ngModel)]="editData.lastName" 
                name="lastName"
                required
                class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
              />
            </div>

            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Téléphone</label>
              <input 
                type="tel" 
                [(ngModel)]="editData.phoneNumber" 
                name="phoneNumber"
                class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent dark:bg-gray-700 dark:text-white"
              />
            </div>

            <div class="space-y-2">
              <label class="text-sm font-medium text-gray-500 dark:text-gray-400">Email (non modifiable)</label>
              <input 
                type="email" 
                [value]="user.email" 
                disabled
                class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-500 cursor-not-allowed"
              />
            </div>
          </div>

          <div class="flex gap-3 pt-4">
            <button 
              type="submit" 
              [disabled]="saving"
              class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
            >
              @if (saving) {
                <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
              }
              Enregistrer
            </button>
            <button 
              type="button" 
              (click)="cancelEdit()"
              [disabled]="saving"
              class="px-6 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition disabled:opacity-50"
            >
              Annuler
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
