<!--
  Modal commun a toute l'app. AVANT, le template avait DEUX wrappers
  fixed inset-0 imbriques (un avec bg-black/50, l'autre avec backdrop-blur),
  ce qui produisait un overlay double bizarre et un rendu visuel cassé sur
  la page Add Event. Maintenant : UN SEUL wrapper qui combine backdrop +
  centrage du contenu.
-->
@if (isOpen) {
<div class="fixed inset-0 z-[99999] flex items-center justify-center overflow-y-auto modal"
     [style.z-index]="zIndex || 99999">
  <!-- Backdrop : seulement si non-fullscreen, intercepte les clics pour fermer. -->
  @if (!isFullscreen) {
    <div class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm"
         (click)="onBackdropClick($event)"></div>
  }

  <!-- Contenu du modal -->
  <div
    [ngClass]="isFullscreen ? 'w-full h-full' : 'relative w-full rounded-3xl bg-white dark:bg-gray-900 shadow-2xl my-8 mx-4'"
    [class]="className"
    (click)="onContentClick($event)"
  >
    @if (showCloseButton) {
    <button
      (click)="close.emit()"
      type="button"
      aria-label="Fermer"
      class="absolute right-3 top-3 z-10 flex h-9 w-9 items-center justify-center rounded-full bg-gray-100 text-gray-500 transition-colors hover:bg-gray-200 hover:text-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white sm:right-5 sm:top-5 sm:h-10 sm:w-10"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M6.04289 16.5413C5.65237 16.9318 5.65237 17.565 6.04289 17.9555C6.43342 18.346 7.06658 18.346 7.45711 17.9555L11.9987 13.4139L16.5408 17.956C16.9313 18.3466 17.5645 18.3466 17.955 17.956C18.3455 17.5655 18.3455 16.9323 17.955 16.5418L13.4129 11.9997L17.955 7.4576C18.3455 7.06707 18.3455 6.43391 17.955 6.04338C17.5645 5.65286 16.9313 5.65286 16.5408 6.04338L11.9987 10.5855L7.45711 6.0439C7.06658 5.65338 6.43342 5.65338 6.04289 6.0439C5.65237 6.43442 5.65237 7.06759 6.04289 7.45811L10.5845 11.9997L6.04289 16.5413Z"
          fill="currentColor"
        />
      </svg>
    </button>
    }
    <div>
      <ng-content></ng-content>
    </div>
  </div>
</div>
}
