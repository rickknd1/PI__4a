<!-- Bouton flottant pour ouvrir/fermer le chatbot -->
<div class="chatbot-toggle" (click)="toggleChat()" [class.active]="isOpen">
  <span *ngIf="!isOpen" class="toggle-icon">🤖</span>
  <span *ngIf="isOpen" class="toggle-icon">✕</span>
  <span *ngIf="!isOpen && hasUnreadMessages" class="notification-badge">!</span>
</div>

<!-- Fenêtre du chatbot -->
<div class="chatbot-container" [class.open]="isOpen">
  <!-- Header -->
  <div class="chatbot-header">
    <div class="header-content">
      <div class="bot-avatar">🤖</div>
      <div class="bot-info">
        <h3>Assistant IA Réglementaire</h3>
        <p class="status">
          <span class="status-dot"></span>
          En ligne
        </p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" (click)="resetChat()" title="Nouvelle conversation">
        🔄
      </button>
      <button class="icon-btn" (click)="toggleChat()" title="Fermer">
        ✕
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chatbot-messages" #messagesContainer>
    <div *ngFor="let message of messages" 
         class="message-wrapper"
         [class.user-message]="message.sender === 'user'"
         [class.bot-message]="message.sender === 'bot'">
      
      <div class="message-avatar" *ngIf="message.sender === 'bot'">
        🤖
      </div>
      
      <div class="message-bubble">
        <div class="message-text" [innerHTML]="formatMessage(message.text)"></div>
        <div class="message-time">
          {{ message.timestamp | date:'HH:mm' }}
        </div>
      </div>
      
      <div class="message-avatar" *ngIf="message.sender === 'user'">
        👤
      </div>
    </div>

    <!-- Indicateur de frappe -->
    <div *ngIf="isTyping" class="message-wrapper bot-message">
      <div class="message-avatar">🤖</div>
      <div class="message-bubble typing-indicator">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <!-- Suggestions rapides -->
  <div class="quick-suggestions" *ngIf="showSuggestions && quickSuggestions.length > 0">
    <div class="suggestions-label">💡 Suggestions :</div>
    <div class="suggestions-list">
      <button *ngFor="let suggestion of quickSuggestions" 
              class="suggestion-btn"
              (click)="sendSuggestion(suggestion)">
        {{ suggestion }}
      </button>
    </div>
  </div>

  <!-- Input -->
  <div class="chatbot-input">
    <div class="input-wrapper">
      <input 
        type="text" 
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
        placeholder="Posez votre question..."
        [disabled]="isTyping"
        #inputField
      />
      <button 
        class="send-btn" 
        (click)="sendMessage()"
        [disabled]="!userInput.trim() || isTyping"
        title="Envoyer">
        <span *ngIf="!isTyping">📤</span>
        <span *ngIf="isTyping" class="spinner-small"></span>
      </button>
    </div>
    <div class="input-hint">
      Appuyez sur Entrée pour envoyer
    </div>
  </div>
</div>
