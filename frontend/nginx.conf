server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/xml+rss image/svg+xml font/woff2;

  # Assets versionnes par hash Angular: cache long (immutable)
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|jpg|jpeg|png|gif|ico|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
    try_files $uri =404;
  }

  # index.html: jamais cache (sinon impossible de pousser une nouvelle version)
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # SPA fallback Angular
  location / {
    try_files $uri $uri/ /index.html;
  }
}
