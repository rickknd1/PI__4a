spring:
  datasource:
    url: jdbc:h2:mem:treasury_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 1025
    username: ''
    password: ''
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
  currency: tnd

gemini:
  api-key: placeholder
  model: gemini-1.5-flash
  max-tokens: 2048

logging:
  level:
    com.clubhub.treasury: DEBUG
    org.springframework.security: WARN
    org.springframework.web: INFO
