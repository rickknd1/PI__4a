stripe:
  # Cles Stripe en variables d'environnement uniquement (jamais en clair sur Git).
  # Pour le dev local, definir dans un fichier .env (non versionne) ou dans IntelliJ Run Config.
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
  # Devise affichee a l'utilisateur (UI, PDF, status endpoint).
  # En prod la devise reelle Stripe peut differer si compte Stripe FR ne supporte pas TND :
  # le service convertit alors via tnd-to-eur-rate au moment du checkout.
  currency: tnd
  # 1 EUR ~= 3.3 TND (taux Banque Centrale Tunisie 2026), donc 1 TND ~= 0.303 EUR.
  # Exemple : 15 TND -> 4.55 EUR sur Stripe / 120 TND -> 36.36 EUR sur Stripe.
  tnd-to-eur-rate: 0.303

gemini:
  # Cle vide = smart fallback local (reponses generees a partir des donnees BDD, sans quota)
  # Mettre une cle valide ici pour basculer sur Gemini (https://aistudio.google.com/apikey)
  api-key: ""
  model: gemini-2.0-flash
  max-tokens: 2048

notification:
  # DESACTIVE en dev — les mails du seed (@esprit.tn) n'existent pas
  # et provoquent des bounces qui floodent la boite Gmail
  # Remettre a true uniquement pour tester avec de vrais emails (kayzeurdylan2@gmail.com)
  email-enabled: false

logging:
  level:
    com.clubhub.treasury: DEBUG
    org.springframework.security: WARN
    org.springframework.web: INFO
    # de.flapdoodle: WARN
