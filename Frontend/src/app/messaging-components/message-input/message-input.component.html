<div class="relative w-full" (click)="$event.stopPropagation()">

    <!-- Hidden file inputs -->
    <input #imageInput type="file" accept="image/*" hidden (change)="onImageSelected($event)">
    <input #fileInput  type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar,.csv" hidden (change)="onFileSelected($event)">

    <!-- Emoji picker floating panel -->
    <div *ngIf="showEmojiPicker" class="emoji-mart-wrapper">
        <emoji-mart
                (emojiSelect)="handleEmojiSelect($event)"
                [isNative]="false"
                [showPreview]="false"
                [enableSearch]="true"
                [darkMode]="false"
                title="ClubHub Emojis"
                set="apple">
        </emoji-mart>
    </div>

    <!-- Attachment preview bar -->
    <div *ngIf="attachedFile" class="attachment-preview-bar">

        <!-- Image preview -->
        <div *ngIf="attachedFileType === 'IMAGE' && imagePreviewUrl" class="image-preview-wrap">
            <img [src]="imagePreviewUrl" alt="preview" class="image-preview-thumb"/>
            <div class="image-preview-info">
                <span class="attach-filename">{{ attachedFile.name }}</span>
                <span class="attach-filesize">{{ formatFileSize(attachedFile.size) }}</span>
            </div>
            <button class="attach-remove-btn" (click)="clearAttachment()" title="Remove">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- File preview (non-image) -->
        <div *ngIf="attachedFileType === 'FILE'" class="file-preview-wrap">
            <div class="file-icon">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
            <div class="file-info">
                <span class="attach-filename">{{ attachedFile.name }}</span>
                <span class="attach-filesize">{{ formatFileSize(attachedFile.size) }}</span>
            </div>
            <button class="attach-remove-btn" (click)="clearAttachment()" title="Remove">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

    </div>

    <!-- Main input row -->
    <div class="flex gap-3 items-end p-2.5 bg-white/80 backdrop-blur-md border-t border-slate-100">

        <div class="flex-1 flex items-end bg-slate-100 rounded-[24px] px-3 py-1.5 transition-all focus-within:ring-2 focus-within:ring-indigo-500/20"
             [style.backgroundColor]="'var(--bubble-color)'">

            <!-- Emoji button -->
            <button (click)="toggleEmojiPicker()"
                    class="p-2 text-slate-500 hover:text-indigo-600 active:scale-90 transition-transform flex-shrink-0"
                    title="Emoji">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </button>

            <!-- Text area -->
            <textarea
                #messageArea
                [(ngModel)]="messageText"
                (input)="adjustHeight(messageArea)"
                (keydown)="handleEnter($event)"
                placeholder="Type a message..."
                rows="1"
                class="flex-1 bg-transparent border-none py-2 px-2 text-sm outline-none resize-none max-h-32 overflow-y-auto leading-relaxed">
      </textarea>

            <!-- Image attach button -->
            <button (click)="triggerImagePicker()"
                    class="p-2 text-slate-500 hover:text-indigo-600 active:scale-90 transition-transform flex-shrink-0"
                    title="Attach image">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
            </button>

            <!-- File attach button -->
            <button (click)="triggerFilePicker()"
                    class="p-2 text-slate-500 hover:text-indigo-600 active:scale-90 transition-transform flex-shrink-0"
                    title="Attach file">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
                </svg>
            </button>

        </div>

        <!-- Send button -->
        <button (click)="onSend()"
                [disabled]="!canSend"
                class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-30 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition-all active:scale-90 flex-shrink-0"
                [style.backgroundColor]="'var(--primary-color)'">
            <svg *ngIf="!isUploading" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-45" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
            <!-- Spinner while uploading -->
            <svg *ngIf="isUploading" class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
        </button>

    </div>
</div>
