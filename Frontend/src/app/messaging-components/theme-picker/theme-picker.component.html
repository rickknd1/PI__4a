<div class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopImmediatePropagation()">
        <div class="modal-body custom-scrollbar">

            <div class="section">
                <div class="section-header-flex">
                    <h3>Thèmes prédéfinis</h3>
                    <button class="close-icon-only" (click)="closeModal()">
                        <svg style="width: 20px; height: 20px;" viewBox="0 0 24 24">
                            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <div class="presets-grid">
                    @for (preset of presets; track $index) {
                        <div class="preset-card" (click)="selectPreset(preset)">
                            <div class="card-inner" [style.background-color]="preset.backgroundColor">
                                <div class="preview-header" [style.background-color]="preset.primaryColor">
                                    <div class="mock-dots">
                                        <span></span><span></span><span></span>
                                    </div>
                                </div>
                                <div class="preview-content">
                                    <div class="mock-bubble other" [style.background-color]="preset.bubbleColor"></div>
                                    <div class="mock-bubble mine" [style.background-color]="preset.primaryColor"></div>
                                </div>
                            </div>
                            <div class="preset-name">{{ preset.name }}</div>
                        </div>
                    }
                </div>
            </div>

            <div class="section ai-studio">
                <div class="ai-header">
                    <div class="ai-title">
                        <span class="sparkle">✨</span>
                        <h4>GÉNÉRER AVEC L'IA</h4>
                    </div>
                    <span class="lyria-badge">Powered by Lyria</span>
                </div>

                <div class="prompt-container">
    <textarea
            [(ngModel)]="aiPrompt"
            placeholder="Ex: cyberpunk neon, plage au coucher du soleil, dark luxury gold..."
            class="ai-textarea">
    </textarea>

                    <button
                            (click)="generateWithAI()"
                            [disabled]="generating || !aiPrompt.trim()"
                            class="generate-btn">
                        <span *ngIf="!generating">Générer le thème</span>
                        <span *ngIf="generating" class="loader"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
