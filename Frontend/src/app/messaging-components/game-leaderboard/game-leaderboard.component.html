<div class="leaderboard-wrapper">
    <div class="leaderboard-card">

        <!-- Header -->
        <div class="header-section">
            <div class="title-glow-ring"></div>
            <h1 class="title-text">CHAMPIONS</h1>
            <p class="subtitle-text">Final Standings</p>
        </div>

        <!-- Podium -->
        <div class="podium-stage">
            <div class="podium-ground-shadow"></div>
            <div class="podium-container">
                <div *ngFor="let player of podiumPlayers; let i = index"
                     [class]="'podium-column ' + (i === 1 ? 'rank-1' : i === 0 ? 'rank-2' : 'rank-3')">

                    <div class="player-float">
                        <div class="avatar-ring">
                            <div class="avatar-circle">
                                {{ (player?.username || '?').charAt(0) }}
                            </div>
                        </div>
                        <div class="name-tag">{{ player?.username || 'Guest' }}</div>
                        <div class="score-tag">{{ getRankEmoji(player?.rank ?? 0) }}</div>
                    </div>

                    <div class="pillar-box">
                        <span class="rank-label">{{ player?.rank }}</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-section">
            <div class="analysis-box">
                <div class="analysis-label">✦ AI ANALYSIS</div>
                <p class="analysis-text">
                    {{ displayedSummary }}<span class="cursor-blink" [class.hidden]="!isTypingSummary">|</span>
                </p>
            </div>

            <div class="action-buttons">
                <button class="btn-primary" (click)="playAgain.emit()">
                    <span class="btn-icon">↺</span> REPLAY CHALLENGE
                </button>
                <button class="btn-outline" (click)="close.emit()">EXIT</button>
            </div>
        </div>
    </div>
</div>
