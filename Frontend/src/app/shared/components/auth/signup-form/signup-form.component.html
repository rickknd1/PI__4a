<div class="w-full max-w-md mx-auto mb-5 sm:pt-10">
  <a routerLink="/"
    class="inline-flex items-center text-sm text-gray-500 transition-colors hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300">
    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 20 20" fill="none" class="size-5">
      <path d="M12.7083 5L7.5 10.2083L12.7083 15.4167" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
    Back to dashboard
  </a>
</div>

<div class="flex flex-col justify-center flex-1 w-full max-w-md mx-auto">
  <div>
    <div class="mb-5 sm:mb-8">
      <h1 class="mb-2 font-semibold text-gray-800 text-title-sm dark:text-white/90 sm:text-title-md">
        Créer votre compte
      </h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        Étape 1/2 — Informations personnelles
      </p>
    </div>

    <!-- Indicateur d'étapes -->
    <div class="flex items-center gap-2 mb-6">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold">1</div>
        <span class="text-sm font-medium text-blue-600">Compte</span>
      </div>
      <div class="flex-1 h-0.5 bg-gray-200"></div>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold">2</div>
        <span class="text-sm text-gray-400">Club</span>
      </div>
    </div>

    <!-- Message erreur -->
    <div *ngIf="error"
         class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm">
      ⚠️ {{ error }}
    </div>

    <form (ngSubmit)="onSignUp()" class="space-y-5">

      <!-- Nom et Prénom -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Prénom *
          </label>
          <input type="text" [(ngModel)]="fname" name="fname"
                 placeholder="Ahmed"
                 class="w-full h-11 rounded-lg border border-gray-300 px-3 text-sm focus:border-blue-500 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Nom *
          </label>
          <input type="text" [(ngModel)]="lname" name="lname"
                 placeholder="Ben Ali"
                 class="w-full h-11 rounded-lg border border-gray-300 px-3 text-sm focus:border-blue-500 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white"/>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Email *
        </label>
        <input type="email" [(ngModel)]="email" name="email"
               placeholder="ahmed@monclub.tn"
               class="w-full h-11 rounded-lg border border-gray-300 px-4 text-sm focus:border-blue-500 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white"/>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
          Mot de passe *
        </label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="password" name="password"
                 placeholder="Mot de passe"
                 class="w-full h-11 rounded-lg border border-gray-300 px-4 pr-12 text-sm focus:border-blue-500 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white"/>
          <span (click)="togglePasswordVisibility()"
                class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400">
            {{ showPassword ? '👁️' : '👁️‍🗨️' }}
          </span>
        </div>
      </div>

      <!-- Checkbox -->
      <div class="flex items-start gap-3">
        <input type="checkbox" [(ngModel)]="isChecked" name="terms"
               class="w-4 h-4 mt-0.5 rounded border-gray-300"/>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          J'accepte les
          <span class="text-gray-800 dark:text-white font-medium">Conditions d'utilisation</span>
          et la
          <span class="text-gray-800 dark:text-white font-medium">Politique de confidentialité</span>
        </p>
      </div>

      <!-- Bouton -->
      <button type="submit" [disabled]="loading"
              class="w-full py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 transition-colors">
        {{ loading ? 'Création...' : 'Continuer →' }}
      </button>

    </form>

    <div class="mt-5">
      <p class="text-sm font-normal text-center text-gray-700 dark:text-gray-400">
        Déjà un compte ?
        <a routerLink="/signin" class="text-blue-500 hover:text-blue-600">
          Se connecter
        </a>
      </p>
    </div>
  </div>
</div>
