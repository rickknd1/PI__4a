<div class="min-h-screen xl:flex">
  <div>
    <app-sidebar></app-sidebar>
  </div>
  <div
      class="flex-1 transition-all duration-300 ease-in-out"
      [ngClass]="{
        'xl:ml-[290px]': (isExpanded$ | async) || (isHovered$ | async),
        'xl:ml-[90px]': !(isExpanded$ | async) && !(isHovered$ | async),
        'ml-0': (isMobileOpen$ | async)
      }"
  >
    <!-- app header start -->
    <app-header/>
    <!-- app header end -->
    <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- ── AI Chatbot flottant (disponible sur toutes les pages) ────────── -->
  <app-ai-chatbot></app-ai-chatbot>

  <!-- ── Toast: PV reminder for SECRETAIRE_GENERALE ────────────────────── -->
  <div *ngIf="pvToast.visible"
       class="fixed bottom-6 right-6 z-[100] max-w-sm bg-white rounded-xl shadow-2xl border-l-4 border-purple-600 overflow-hidden animate-slide-in">
    <div class="flex items-start gap-3 p-4">
      <div class="text-3xl">📄</div>
      <div class="flex-1">
        <h4 class="font-semibold text-gray-900 mb-1">PV en attente</h4>
        <p class="text-sm text-gray-600 mb-3">
          {{ pvToast.count }} événement{{ pvToast.count > 1 ? 's' : '' }} terminé{{ pvToast.count > 1 ? 's' : '' }}
          attend{{ pvToast.count > 1 ? 'ent' : '' }} la rédaction de leur Procès-Verbal.
        </p>
        <div class="flex gap-2">
          <button (click)="goToPv()"
                  class="px-3 py-1.5 bg-purple-600 hover:bg-purple-700 text-white text-sm rounded-md font-medium">
            Rédiger maintenant
          </button>
          <button (click)="dismissToast()"
                  class="px-3 py-1.5 text-gray-500 hover:text-gray-700 text-sm">
            Plus tard
          </button>
        </div>
      </div>
      <button (click)="dismissToast()"
              class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
    </div>
  </div>
</div>
