<div class="lobby-bg">

  <!-- Particles déco -->
  <div class="particles">
    <div class="particle" *ngFor="let p of [1,2,3,4,5,6,7,8]"></div>
  </div>

  <form
    class="lobby-card"
    novalidate
    (ngSubmit)="enterRoom($event)"
  >
    <div class="lobby-header">
      <div class="logo">🌐</div>
      <h1>Virtual Event Room</h1>
      <p class="subtitle">Rejoins la salle de réunion virtuelle</p>
    </div>

    <!-- Nom du joueur -->
    <div class="name-section">
      <label>Ton nom affiché</label>
      <input
        name="playerName"
        [(ngModel)]="playerName"
        [placeholder]="selectedAvatar?.name || 'Entrer ton pseudo...'"
        class="name-input"
        maxlength="20"
        autocomplete="nickname"
      />
    </div>

    <!-- Choix d'avatar -->
    <div class="avatar-section">
      <label>Choisis ton avatar</label>
      <div class="avatar-grid">
        <div
          *ngFor="let av of avatarOptions"
          class="avatar-card"
          [class.selected]="selectedAvatar?.id === av.id"
          (click)="selectAvatar(av)"
          [style.--av-color]="av.color"
        >
          <div class="avatar-bubble" [style.background]="av.color">
            <span class="avatar-emoji">{{ av.emoji }}</span>
          </div>
          <span class="avatar-name">{{ av.name }}</span>
          <div class="selected-check" *ngIf="selectedAvatar?.id === av.id">✓</div>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <button
      type="button"
      class="enter-btn"
      [disabled]="!selectedAvatar"
      [class.ready]="selectedAvatar"
      (click)="enterRoom($event)"
    >
      <span *ngIf="!selectedAvatar">Choisir un avatar d'abord</span>
      <span *ngIf="selectedAvatar">
        Entrer comme {{ playerName || selectedAvatar.name }} &nbsp;→
      </span>
    </button>
  </form>
</div>
