<div class="h-screen flex bg-gray-950 text-white">

  <!-- 🎥 VIDEO -->
  <div class="flex-1 flex flex-col">

    <!-- HEADER -->
    <div class="flex justify-between items-center p-4 bg-gray-900 border-b border-gray-800">
      <h2 class="font-bold text-lg">{{ event?.title }}</h2>

      <button (click)="leaveMeeting()"
              class="bg-red-500 px-4 py-2 rounded-xl">
        Quitter
      </button>
    </div>

    <!-- JITSI -->
    <div id="jitsi-container" class="flex-1"></div>

    <!-- CONTROLS -->
    <div class="p-4 bg-gray-900 flex gap-4 justify-center">

      <button *ngIf="!isRecording"
              (click)="askRecordConsent()"
              class="bg-green-600 px-4 py-2 rounded-xl">
        🎙️ Record
      </button>

      <button *ngIf="isRecording"
              (click)="stopRecording()"
              class="bg-red-600 px-4 py-2 rounded-xl">
        ⏹ Stop
      </button>

    </div>

  </div>

  <!-- 💬 CHAT -->
  <div class="w-80 bg-gray-900 border-l border-gray-800 flex flex-col">

    <div class="p-4 font-bold border-b border-gray-700">
      💬 Chat
    </div>

    <div class="flex-1 overflow-y-auto p-3 space-y-2">
      <div *ngFor="let msg of messages">
        <span class="text-indigo-400 text-xs">{{ msg.from }}</span>
        <p class="text-sm">{{ msg.text }}</p>
      </div>
    </div>

    <div class="p-3 border-t border-gray-700 flex gap-2">
      <input #msgInput
             type="text"
             class="flex-1 p-2 rounded bg-gray-800 text-white"
             placeholder="Message..." />

      <button (click)="sendMessage(msgInput.value); msgInput.value=''"
              class="bg-indigo-600 px-3 rounded">
        Envoyer
      </button>
    </div>

  </div>

</div>

<!-- ⚠️ MODAL CONFIRMATION RECORD -->
<div *ngIf="showRecordConsent"
     class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">

  <div class="bg-gray-900 p-6 rounded-2xl w-96 text-center border border-gray-700 shadow-xl">

    <h3 class="text-xl font-bold mb-4">
      ⚠️ Enregistrement du meeting
    </h3>

    <p class="mb-6 text-gray-300">
      Ce meet sera enregistré.
      Voulez-vous rester dans la réunion ?
    </p>

    <div class="flex justify-center gap-4">

      <button (click)="acceptRecording()"
              class="bg-green-600 hover:bg-green-700 px-5 py-2 rounded-xl">
        Oui, je reste
      </button>

      <button (click)="refuseRecording()"
              class="bg-red-600 hover:bg-red-700 px-5 py-2 rounded-xl">
        Non, quitter
      </button>

    </div>

  </div>

</div>
