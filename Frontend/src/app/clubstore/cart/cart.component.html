<div class="p-6">
  <h1 class="text-2xl font-bold mb-6">🛒 Mon Panier</h1>

  <div *ngIf="cartItems.length === 0" class="text-center py-10">
    <p class="text-gray-500">Votre panier est vide</p>
    <a routerLink="/products" class="inline-block mt-4 bg-blue-500 text-white px-4 py-2 rounded">Voir les produits</a>
  </div>

  <div *ngIf="cartItems.length > 0">
    <div class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr>
            <th class="text-left p-2 border-b">Produit</th>
            <th class="text-left p-2 border-b">Prix</th>
            <th class="text-left p-2 border-b">Quantité</th>
            <th class="text-left p-2 border-b">Total</th>
            <th class="text-left p-2 border-b"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of cartItems">
            <td class="p-2 border-b">{{ item.name }}</td>
            <td class="p-2 border-b">{{ item.price }} DT</td>
            <td class="p-2 border-b">
              <input type="number"
                     [ngModel]="item.quantity"
                     (ngModelChange)="updateQuantity(item, $event)"
                     class="w-16 px-2 py-1 border rounded"
                     min="1"
                     [max]="item.stockQuantity || 999">
            </td>
            <td class="p-2 border-b">{{ item.price * item.quantity }} DT</td>
            <td class="p-2 border-b">
              <button (click)="removeItem(item)" class="text-red-500 hover:text-red-700">Supprimer</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-6 text-right">
      <p class="text-xl font-bold">Total: {{ totalPrice }} DT</p>
      <p class="text-sm text-gray-500">Articles: {{ totalItems }}</p>
      <div class="mt-4 space-x-2">
        <button (click)="clearCart()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Vider</button>
        <button (click)="checkout()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Commander</button>
      </div>
    </div>
  </div>
</div>
