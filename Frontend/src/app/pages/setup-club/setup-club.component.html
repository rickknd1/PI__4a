<div class="min-h-screen bg-gray-50 dark:bg-gray-900 flex items-center justify-center p-4">
  <div class="w-full max-w-lg bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8">

    <!-- Header -->
    <div class="mb-6">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-bold">1</div>
        <div class="flex-1 h-0.5 bg-blue-600"></div>
        <div class="w-8 h-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm">2</div>
      </div>
      <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Créez votre club</h1>
      <p class="text-gray-500 text-sm mt-1">Étape 2/2 — Personnalisez votre espace</p>
    </div>

    <!-- Erreur -->
    <div *ngIf="error" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm">
      ⚠️ {{ error }}
    </div>

    <form (ngSubmit)="createClub()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nom du club *</label>
        <input type="text" [(ngModel)]="clubName" name="clubName"
               placeholder="Ex: IEEE ENIT, Croissant Rouge..."
               class="w-full h-11 rounded-lg border border-gray-300 px-4 text-sm focus:border-blue-500 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
        <textarea [(ngModel)]="description" name="description" rows="3"
                  class="w-full rounded-lg border border-gray-300 px-4 py-2 text-sm focus:border-blue-500 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Catégorie</label>
        <select [(ngModel)]="category" name="category"
                class="w-full h-11 rounded-lg border border-gray-300 px-4 text-sm focus:border-blue-500 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white">
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Logo (URL)</label>
        <input type="url" [(ngModel)]="logoUrl" name="logoUrl"
               placeholder="https://monclub.tn/logo.png"
               class="w-full h-11 rounded-lg border border-gray-300 px-4 text-sm focus:border-blue-500 focus:outline-none dark:border-gray-700 dark:bg-gray-900 dark:text-white"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Couleur principale</label>
        <div class="flex items-center gap-3">
          <input type="color" [(ngModel)]="colorPalette" name="colorPalette"
                 class="w-12 h-11 rounded-lg border border-gray-300 cursor-pointer"/>
          <div class="flex-1 h-11 rounded-lg flex items-center justify-center text-white text-sm font-medium"
               [style.background-color]="colorPalette">
            Aperçu
          </div>
        </div>
      </div>

      <button type="submit" [disabled]="loading || !clubName.trim()"
              class="w-full py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors mt-2">
        {{ loading ? 'Création...' : '🚀 Créer mon club' }}
      </button>

      <p *ngIf="!clubName.trim() && !loading"
         class="text-xs text-gray-500 text-center mt-2">
        Saisissez le nom du club pour activer le bouton.
      </p>

    </form>
  </div>
</div>
