spring.application.name=club-service

# ===========================================================================
# Eureka — ce service s'enregistre dans l'annuaire au démarrage.
# Le Gateway le trouve ensuite via `lb://club-service`.
# ===========================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# MongoDB Local — base dédiée au club-service (évite le conflit de casse avec
# la base "ClubHub" du Backend ; MongoDB n'autorise pas deux DBs ne différant
# que par la casse).
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=ClubHub_Clubs

# Server port
server.port=8083

# JWT — secret PARTAGE avec user-service / treasury / EventManagement / voice
# (sans cette ligne le club-service rejette les tokens valides)
jwt.secret=clubhub_super_secret_key_must_be_at_least_32_chars!
jwt.expiration=86400000
jwt.cookie-name=jwt
user-service.base-url=http://localhost:8081

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.clubhub=DEBUG

# Instant Voice channels service base URL
voice.service.channels-url=http://localhost:8082/api/channels

# ----- Gmail API (fandouli.mahou@gmail.com) -----
gmail.user.email=fandouli.mahou@gmail.com
gmail.credentials.file=credentials.json

# Frontend URL utilisee dans les emails d'invitation (lien setup-password,
# lien QR election, etc.). Surchargeable via la variable d'env APP_FRONTEND_URL.
#
# Cas d'usage :
# - dev local solo : http://localhost:4200 (le destinataire ouvre l'email
#   sur la meme machine que l'app)
# - partage entre devs / demo : URL ngrok (ex: https://abc.ngrok-free.app)
#   -> lancer : ngrok http 4200, puis demarrer le service avec
#      APP_FRONTEND_URL=https://abc.ngrok-free.app mvnw spring-boot:run
# - prod : domaine reel (https://app.clubhub.tn)
#
# AVANT : http://192.168.1.20:4200 (IP locale figee qui change avec DHCP
# et ne marche pas pour des destinataires hors LAN)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}

# CORS — entièrement géré par le Gateway (port 8084).
# Ne RIEN configurer ici sous peine de doublons Access-Control-Allow-Origin
# qui font rejeter la réponse par le navigateur.

# ===========================================================================
# SpringDoc OpenAPI / Swagger UI
# Swagger UI: http://localhost:8083/swagger-ui.html
# OpenAPI JSON: http://localhost:8083/api-docs
# ===========================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
