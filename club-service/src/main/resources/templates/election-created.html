<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { background: #f9f9f9; padding: 30px; border-radius: 0 0 10px 10px; }
        .info-box { background: white; padding: 15px; margin: 15px 0; border-left: 4px solid #667eea; border-radius: 5px; }
        .button { display: inline-block; background: #667eea; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; margin: 20px 0; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗳️ Nouvelle Élection</h1>
            <p th:text="${clubName}"></p>
        </div>
        <div class="content">
            <h2 th:text="${electionTitle}"></h2>
            <p th:text="${electionDescription}"></p>
            <div class="info-box">
                <p><strong>📅 Date de début:</strong> <span th:text="${startDate}"></span></p>
                <p><strong>📅 Date de fin:</strong> <span th:text="${endDate}"></span></p>
                <p><strong>📍 Type:</strong> <span th:text="${electionType}"></span></p>
                <p th:if="${hasLocation}"><strong>🏢 Lieu:</strong> <span th:text="${location}"></span></p>
            </div>
            <div class="info-box" style="border-left-color: #f59e0b;">
                <p><strong>⏰ Date limite de candidature:</strong></p>
                <p style="font-size: 18px; color: #f59e0b;" th:text="${candidacyDeadline}"></p>
                <p style="font-size: 14px; color: #666;">Les candidatures seront fermées 24h avant le début de l'élection</p>
            </div>
            <p><strong>Vous souhaitez vous présenter comme candidat ?</strong></p>
            <center>
                <a th:href="${applyLink}" class="button">📝 Postuler maintenant</a>
            </center>
        </div>
        <div class="footer">
            <p>Cet email a été envoyé automatiquement par ClubHub</p>
        </div>
    </div>
</body>
</html>
