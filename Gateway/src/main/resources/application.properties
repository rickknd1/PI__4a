spring.application.name=gateway
server.port=8084

# ===========================================================================
# Eureka — la Gateway est aussi un CLIENT Eureka : elle consulte l'annuaire
# pour traduire `lb://<service-name>` en `http://<ip-réelle>:<port>`.
# Elle s'enregistre elle-même (optionnel mais pratique pour la démo).
# ===========================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===========================================================================
# ROUTES DYNAMIQUES — les URI utilisent `lb://<spring.application.name>`
# au lieu d'une adresse IP/port en dur. La Gateway demande à Eureka la
# liste des instances actives et load-balance entre elles (round-robin).
#
# ⚠️ Les noms doivent correspondre EXACTEMENT au `spring.application.name`
# défini dans chaque micro-service :
#   user-service        → voir user-service/application.properties
#   club-service        → voir club-service/application.properties
#   clubhub-backend     → voir Backend/application.properties
# ===========================================================================

# ----- User Service (auth, users, roles, permissions) -----
spring.cloud.gateway.server.webflux.routes[0].id=user-auth
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

