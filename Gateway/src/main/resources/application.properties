# ----- Voice2 backend (isolé pour intégration non destructive) -----
# Expose le service InstantVoiceManagment sous un préfixe dédié:
# /api/voice2/*  ->  /api/*
# /ws/voice2/*   ->  /ws/*
# ⚠️ IMPORTANT: Ces routes DOIVENT être avant les routes génériques /api/notifications
# sinon le Gateway capture /api/notifications avant de vérifier /api/voice2/notifications
spring.cloud.gateway.server.webflux.routes[20].id=voice2-channels
spring.cloud.gateway.server.webflux.routes[20].uri=lb://instant-voice-management
spring.cloud.gateway.server.webflux.routes[20].predicates[0]=Path=/api/voice2/channels,/api/voice2/channels/**
spring.cloud.gateway.server.webflux.routes[20].filters[0]=RewritePath=/api/voice2/channels(?<segment>/?.*), /api/channels$\{segment}

spring.cloud.gateway.server.webflux.routes[21].id=voice2-audio
spring.cloud.gateway.server.webflux.routes[21].uri=lb://instant-voice-management
spring.cloud.gateway.server.webflux.routes[21].predicates[0]=Path=/api/voice2/audio/**
spring.cloud.gateway.server.webflux.routes[21].filters[0]=RewritePath=/api/voice2/audio/(?<segment>.*), /api/audio/$\{segment}

spring.cloud.gateway.server.webflux.routes[22].id=voice2-voice
spring.cloud.gateway.server.webflux.routes[22].uri=lb://instant-voice-management
