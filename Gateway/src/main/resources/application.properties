# ===========================================================================
# CORS global — inchangé, le Gateway répond toujours aux pré-flights
# ===========================================================================
# Évite les réponses CORS invalides quand des headers sont renvoyés à la fois
# par le backend et par le Gateway.
spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Headers Access-Control-Allow-Methods RETAIN_FIRST
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
# Les deux (localhost et 127.0.0.1) : l'Origin de l'appli doit matcher exactement.
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origin-patterns[0]=http://localhost:4200
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origin-patterns[1]=http://127.0.0.1:4200
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origin-patterns[2]=http://192.168.1.20:4200
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].max-age=3600

# ===========================================================================
# FILE UPLOAD LIMITS (Gateway WebFlux)
# ===========================================================================
spring.webflux.multipart.max-disk-usage-per-part=500MB
spring.codec.max-in-memory-size=500MB

# ===========================================================================
# SpringDoc OpenAPI / Swagger UI — AGGREGATION HUB
# Le Gateway agrege les docs de TOUS les microservices dans un seul Swagger UI.
# Swagger UI: http://localhost:8084/swagger-ui.html (selecteur en haut)
# OpenAPI JSON (Gateway lui-meme): http://localhost:8084/api-docs
# ===========================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method

# Aggregation des docs des microservices (selecteur deroulant dans Swagger UI)
