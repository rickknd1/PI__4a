spring.application.name=instant-voice-management
spring.mongodb.uri=mongodb://localhost:27017/instantVoiceMessaging
spring.mongodb.database=instantVoiceMessaging
server.port=8082
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}

jwt.secret=clubhub_super_secret_key_must_be_at_least_32_chars!
jwt.expiration=86400000

# Path to the Python moderation service script (relative to IntelliJ working dir, or absolute)
ai.service.script=../AudioModerationService/main.py
ai.moderation.base-url=http://localhost:8001


# CORS Configuration
spring.webflux.cors.allowed-origins=http://localhost:4200,http://192.168.1.20:4200
spring.webflux.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.webflux.cors.allowed-headers=*
spring.webflux.cors.allow-credentials=true