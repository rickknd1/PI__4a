spring.application.name=eureka-server
server.port=8761

# ===========================================================================
# Le serveur Eureka NE doit pas s'enregistrer auprès de lui-même, sinon il
# boucle dans les logs au démarrage.
# ===========================================================================
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# ===========================================================================
# Mode "self-preservation" : en prod, Eureka conserve un service en mémoire
# pendant ~90s même s'il ne reçoit plus de heartbeat (pour absorber les
# coupures réseau). En DEV c'est trompeur (un service qu'on a Ctrl+C reste
# affiché pendant 1 min 30) → on désactive et on évince plus rapidement.
# ===========================================================================
eureka.server.enable-self-preservation=false
eureka.server.eviction-interval-timer-in-ms=5000

# Pas besoin du dashboard sécurisé en local
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
