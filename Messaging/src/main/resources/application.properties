spring.application.name=messaging-service

server.port=8089

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/Messaging
spring.data.mongodb.gridfs.bucket=themes

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# JWT (shared secret with other services for cross-service token validation)
jwt.secret=clubhub_super_secret_key_must_be_at_least_32_chars!

# Groq / OpenAI (placeholder if env not set, optional for demo)
# Spring AI requires a non-empty value to instantiate the OpenAiChatModel bean.
# Real key is read from GROQ_API_KEY env var at runtime; otherwise a dummy
# value keeps the bean alive (AI features will fail at call-time, which is
# acceptable for the demo since trivia AI generation is optional).
spring.ai.openai.api-key=${GROQ_API_KEY:dummy-key-not-used-at-runtime}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2000

# Ollama (optional)
ollama.url=http://localhost:11434
ollama.model=llama3.2

# Hugging Face (optional)
huggingface.api.token=${HF_API_TOKEN:}

# Multipart limits (for base64 photos)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
server.tomcat.max-http-form-post-size=25MB
server.tomcat.max-swallow-size=25MB

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator (for health check)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
