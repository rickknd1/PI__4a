# ── AI stack (100% local, no third-party API) ───────────────────────────
# ClubHub has THREE AI tiers evaluated in this order at each request:
#
#   Tier 1 — Custom in-house ML models (scikit-learn RandomForest for
#            event recommendation + rule-based French NLP for PV
#            generation). Served by the Python service in ai-service/.
#            Endpoints: /v1/custom/recommend, /v1/custom/pv
#            This is the intelligence we own, train, and can explain
#            (feature_importances_). Shown in the UI as source="custom-ml".
#
#   Tier 2 — Local LLM fallback via Ollama, served by the SAME Python
#            service. Endpoints: /v1/generate/text, /v1/generate/json.
#            Only used when the task is too open-ended for Tier 1
#            (e.g. free-form event description drafts).
#
#   Tier 3 — Deterministic Java templates (always available, baked into
#            PvAiService.fallbackTemplate and EventRecommendationController
#            .recommendDeterministic). Guarantees the app never breaks.
#
# Values for ai.provider (Tier 2 routing):
#   local  → Python FastAPI service → Ollama                   ← default
#   none   → disable Tier 2 entirely; Tier 1 → Tier 3
ai.provider=${AI_PROVIDER:local}

# ── Local AI service (see ai-service/ folder, run with run.ps1) ─────────
# Serves BOTH the custom models (Tier 1) and the Ollama bridge (Tier 2).
# Leave empty to disable everything served by Python (both tiers fall
# through to Tier 3).
ai.local.base-url=${AI_LOCAL_BASE_URL:http://localhost:8000}
ai.local.timeout-ms=120000

# ===========================================================================
# SpringDoc OpenAPI / Swagger UI
# Swagger UI: http://localhost:8088/swagger-ui.html
# OpenAPI JSON: http://localhost:8088/api-docs
# ===========================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method