spring.application.name=clubhub-backend
spring.mongodb.uri=mongodb://localhost:27017/eventsManagement
spring.mongodb.database=eventsManagement
server.port=8088

# ===========================================================================
# Eureka — ce service s'enregistre dans l'annuaire au démarrage.
# Le Gateway le trouve ensuite via `lb://clubhub-backend`.
# ===========================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Public URL (ngrok / production) ─────────────────────────────────────
# When the backend is exposed through a tunnel (ngrok, cloudflared, …)
# the raw `Host` header reaching Tomcat is still `localhost:8080`, so any
# URL we build with ServletUriComponentsBuilder.fromCurrentContextPath()
# would point back to localhost — making the printed/embedded QR codes
# unscannable from a phone.
#
# Default below points to the ClubHub ngrok reserved domain so the QR
# codes work out-of-the-box without exporting any env var. Override at
# runtime if you change tunnels:
#   PowerShell:  $env:APP_PUBLIC_URL="https://<other>.ngrok-free.dev"
#   .env / IDE:  APP_PUBLIC_URL=https://<other>.ngrok-free.dev
# Set APP_PUBLIC_URL to an empty string explicitly to fall back to the
# request's own host (only useful for pure local-LAN demos).
app.public-url=${APP_PUBLIC_URL:https://leptosomic-wreathless-coleen.ngrok-free.dev}

# Honour X-Forwarded-* headers when running behind ngrok / a reverse proxy
# so Spring sees the real public scheme + host (https + tunnel domain).
server.forward-headers-strategy=framework

# ── Shared JWT secret ───────────────────────────────────────────────────
# MUST match `jwt.secret` in user-service so this backend can decode the
# `jwt` cookie set at login and recover the connected user identity
# (email, userId, role) for session-aware endpoints (RSVP, feedback, etc.).
jwt.secret=clubhub_super_secret_key_must_be_at_least_32_chars!

# URL used to resolve full user profile (firstName/lastName/photo) from
# the connected user's id. Only invoked once per session in SessionService.
user-service.base-url=http://localhost:8081

